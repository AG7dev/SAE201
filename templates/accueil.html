<!-- 
  =====================================================
   SAE 2.01 - Développement d'une application WEB

   Fichier accueil.html :
   Page d'accueil permettant la sélection des filtres
   pour consulter les effectifs médicaux.
  ===================================================== 
--> 

{% extends "base.html" %}

{% block titre %}Accueil{% endblock %}

{% block contenu %}

    <h2>Consulter les effectifs</h2>

    <form action="{{ url_for('effectifs.afficher') }}" method="get">

        <div class="form-grid">

            <div class="form-group">
                <label for="profession">Profession</label>
                <select name="profession_id" id="profession" required>
                    <option value="">-- Choisir --</option>
                    {% for p in professions %}
                        <option value="{{ p.id }}">{{ p.libelle }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label for="region">Région</label>
                <select name="region_id" id="region" required>
                    <option value="">-- Choisir --</option>
                    {% for r in regions %}
                        <option value="{{ r.id }}">{{ r.libelle }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label for="departement">Département</label>
                <select name="departement_id" id="departement" required>
                    <option value="">-- Choisir une région --</option>
                </select>
            </div>

            <div class="form-group">
                <label for="annee">Année</label>
                <select name="annee" id="annee" required>
                    {% for a in range(2023, 2014, -1) %}
                        <option value="{{ a }}">{{ a }}</option>
                    {% endfor %}
                </select>
            </div>

        </div>
        <button type="submit" class="btn-primary">Afficher les effectifs</button>
    </form>

    <h2>Consulter les prescriptions</h2>

    <form action="{{ url_for('prescriptions.afficher') }}" method="get">

        <div class="form-grid">

            <div class="form-group">
                <label for="profession">Profession</label>
                <select name="profession_id" id="profession1" required>
                    <option value="">-- Choisir --</option>
                    {% for p in professions %}
                        <option value="{{ p.id }}">{{ p.libelle }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label for="region">Région</label>
                <select name="region_id" id="region1" required>
                    <option value="">-- Choisir --</option>
                    {% for r in regions %}
                        <option value="{{ r.id }}">{{ r.libelle }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label for="departement">Département</label>
                <select name="departement_id" id="departement1" required>
                    <option value="">-- Choisir --</option>
                </select>
            </div>

            <div class="form-group">
                <label for="annee">Année</label>
                <select name="annee" id="annee" required>
                    {% for a in range(2023, 2014, -1) %}
                        <option value="{{ a }}">{{ a }}</option>
                    {% endfor %}
                </select>
            </div>

        </div>

        <button type="submit" class="btn-primary">Afficher les prescriptions</button>

    </form>

    <script src="{{ url_for('static', filename='js/cascade.js') }}"></script>

{% endblock %}
